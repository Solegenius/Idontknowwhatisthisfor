<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>DOOM (standalone)</title>
    
    <!-- js-dos CSS -->
    <link rel="stylesheet" href="https://br.cdn.dos.zone/js-dos/latest/js-dos.css">
    <!-- Tailwind CSS (for layout) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Optional: your own extra styles if needed -->
</head>
<body class="bg-base-200" style="background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

<!-- Game container (copied from original) -->
<div class="mockup-window bg-base-300 relative" style="width: 90%; max-width: 800px; background-color: #2d2d2d; border-radius: 8px;">
    
    <!-- Emulator area -->
    <div class="flex justify-center px-4 py-16 bg-base-100 relative h-aspect" style="background-color: #111; aspect-ratio: 4/3;">
        <div class="jsdos wh-full z-10"
             data-bg="https://dos.zone/images/containers/assets/backgrounds/doom_1.jpg/fe8f7f08ddbeced41a847eca0dcd5bbf.webp"
             data-lang="en"
             data-url="https://cdn.dos.zone/custom/dos/doom.jsdos"
             data-config=""
             style="width: 100%; height: 100%;">
        </div>
    </div>

    <!-- Fullscreen controls (optional) -->
    <div class="flex flex-row absolute top-3 left-2 gap-1 items-center bg-base-300 z-50 fullscreen-controls" style="position: absolute; top: 0.75rem; left: 0.5rem;">
        <button class="jsdos-soft-fullscreen btn-disabled btn btn-xs btn-ghost text-primary-accent" style="background: none; border: none; color: #ccc;">
            <svg ... (same SVG as original) ...></svg>
        </button>
        <button class="jsdos-fullscreen btn btn-xs btn-ghost text-primary-accent" style="background: none; border: none; color: #ccc;">
            <svg ...></svg>
            Fullscreen
        </button>
    </div>

    <!-- Rating and extra buttons (optional) -->
    <div class="flex flex-row absolute top-3 right-4 gap-4" style="position: absolute; top: 0.75rem; right: 1rem; color: white;">
        <div class="flex items-center gap-2 rate">
            <svg class="w-4 h-4 text-warning" ...></svg>
            <p class="text-sm font-bold">5</p>
        </div>
    </div>
</div>

<!-- js-dos JavaScript (must be placed after the container) -->
<script src="https://br.cdn.dos.zone/js-dos/latest/js-dos.js"></script>

<!-- Optional: if you need like/dislike functionality, you'd have to implement separately -->
</body>
</html>
